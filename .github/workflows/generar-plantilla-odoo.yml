name: Generar plantilla Odoo

on:
  workflow_dispatch:
    inputs:
      origen:
        description: "Ubicación origen"
        required: true
        default: "CUATI/Existencias"

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generar plantilla general Odoo
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          SOURCE_LOCATION_NAME: ${{ github.event.inputs.origen }}
          OUTPUT_DIR: salidas
        run: |
          python src/generar_plantilla_odoo.py generar --origen "$SOURCE_LOCATION_NAME" --salida "$OUTPUT_DIR"

      - name: Subir plantilla generada
        uses: actions/upload-artifact@v4
        with:
          name: plantilla-odoo-generada
          path: salidas/*.xlsx
